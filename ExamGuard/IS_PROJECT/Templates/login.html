<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ExamGuard — AI Cheating Prevention & Centralized Exam Monitoring System. Secure administrator login.">
    <title>ExamGuard — Secure Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ------------------------------------------------------------------ */
        /*  RESET & BASE                                                        */
        /* ------------------------------------------------------------------ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --blue:        #007AFF;
            --blue-hover:  #0062CC;
            --blue-light:  #E8F1FF;
            --blue-mid:    #C5DEFF;
            --red:         #FF3B30;
            --gray-50:     #F9FAFB;
            --gray-100:    #F3F4F6;
            --gray-200:    #E5E7EB;
            --gray-400:    #9CA3AF;
            --gray-600:    #4B5563;
            --gray-800:    #1F2937;
            --gray-900:    #111827;
            --white:       #FFFFFF;
            --shadow-sm:   0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md:   0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
            --shadow-lg:   0 12px 40px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.05);
            --radius:      16px;
            --radius-sm:   10px;
            --radius-xs:   8px;
            --transition:  0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ------------------------------------------------------------------ */
        /*  PAGE BACKGROUND                                                     */
        /* ------------------------------------------------------------------ */
        body {
            background: linear-gradient(145deg, #EEF4FF 0%, #F5F7FA 40%, #EAF0FB 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative blurred circles */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 560px;
            height: 560px;
            background: radial-gradient(circle, rgba(0,122,255,0.09) 0%, transparent 70%);
            top: -160px;
            right: -140px;
        }
        body::after {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(52,199,89,0.07) 0%, transparent 70%);
            bottom: -120px;
            left: -100px;
        }

        /* ------------------------------------------------------------------ */
        /*  CARD                                                                */
        /* ------------------------------------------------------------------ */
        .login-card {
            position: relative;
            z-index: 1;
            background: var(--white);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            padding: 52px 44px 44px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(0,0,0,0.05);
            animation: cardEnter 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1);    }
        }

        /* ------------------------------------------------------------------ */
        /*  BRAND HEADER                                                        */
        /* ------------------------------------------------------------------ */
        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: linear-gradient(145deg, #007AFF, #3B97FF);
            border-radius: 18px;
            margin-bottom: 18px;
            box-shadow: 0 6px 20px rgba(0,122,255,0.28);
            animation: logoPulse 3.2s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 6px 20px rgba(0,122,255,0.28); }
            50%       { box-shadow: 0 8px 28px rgba(0,122,255,0.42); }
        }

        .brand-logo svg {
            width: 30px;
            height: 30px;
            fill: none;
            stroke: #fff;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .brand-name {
            font-size: 26px;
            font-weight: 800;
            color: var(--gray-900);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .brand-sub {
            font-size: 13px;
            font-weight: 400;
            color: var(--gray-400);
            letter-spacing: 0.01em;
        }

        /* ------------------------------------------------------------------ */
        /*  DIVIDER                                                             */
        /* ------------------------------------------------------------------ */
        .divider {
            height: 1px;
            background: var(--gray-200);
            margin: 0 0 28px;
        }

        /* ------------------------------------------------------------------ */
        /*  SECTION LABEL                                                       */
        /* ------------------------------------------------------------------ */
        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--gray-400);
            margin-bottom: 18px;
        }

        /* ------------------------------------------------------------------ */
        /*  FORM FIELDS                                                         */
        /* ------------------------------------------------------------------ */
        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-600);
            margin-bottom: 6px;
        }

        .field-input-wrap {
            position: relative;
        }

        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            pointer-events: none;
            transition: color var(--transition);
            display: flex;
            align-items: center;
        }

        .field-icon svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .field input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 400;
            color: var(--gray-900);
            background: var(--gray-50);
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-sm);
            outline: none;
            transition: border-color var(--transition),
                        background var(--transition),
                        box-shadow var(--transition);
            appearance: none;
            -webkit-appearance: none;
        }

        .field input::placeholder {
            color: var(--gray-400);
            font-weight: 400;
        }

        .field input:focus {
            border-color: var(--blue);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
        }

        .field input:focus + .field-icon,
        .field-input-wrap:focus-within .field-icon {
            color: var(--blue);
        }

        /* fix icon layering — icon is after input in DOM for CSS trick */
        .field-input-wrap input {
            padding-left: 42px;
        }

        /* ------------------------------------------------------------------ */
        /*  SUBMIT BUTTON                                                       */
        /* ------------------------------------------------------------------ */
        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            color: var(--white);
            background: linear-gradient(180deg, #1A8AFF 0%, #007AFF 100%);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            letter-spacing: 0.01em;
            box-shadow: 0 4px 14px rgba(0,122,255,0.32);
            transition: transform var(--transition),
                        box-shadow var(--transition),
                        background var(--transition);
            position: relative;
            overflow: hidden;
        }

        .login-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 100%);
            pointer-events: none;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 7px 20px rgba(0,122,255,0.38);
            background: linear-gradient(180deg, #2E96FF 0%, #0A84FF 100%);
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(0,122,255,0.28);
        }

        /* ------------------------------------------------------------------ */
        /*  ERROR MESSAGE                                                       */
        /* ------------------------------------------------------------------ */
        .login-error {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 11px 14px;
            background: #FFF1F0;
            border: 1px solid rgba(255,59,48,0.20);
            border-radius: var(--radius-xs);
            font-size: 13px;
            font-weight: 500;
            color: var(--red);
            animation: shake 0.35s ease;
        }

        .login-error svg {
            flex-shrink: 0;
            width: 15px;
            height: 15px;
            stroke: var(--red);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-6px); }
            40%       { transform: translateX(6px); }
            60%       { transform: translateX(-4px); }
            80%       { transform: translateX(4px); }
        }

        /* ------------------------------------------------------------------ */
        /*  FOOTER                                                              */
        /* ------------------------------------------------------------------ */
        .login-footer {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--gray-200);
            text-align: center;
            font-size: 11.5px;
            color: var(--gray-400);
            line-height: 1.6;
        }

        .login-footer strong {
            color: var(--gray-600);
            font-weight: 600;
        }

        /* ------------------------------------------------------------------ */
        /*  RESPONSIVE                                                          */
        /* ------------------------------------------------------------------ */
        @media (max-width: 480px) {
            .login-card {
                padding: 40px 28px 36px;
            }
            .brand-logo {
                width: 56px;
                height: 56px;
            }
            .brand-name {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">

        <!-- Brand Header -->
        <div class="brand">
            <div class="brand-logo">
                <!-- Shield SVG icon -->
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L3 6.5V12c0 4.5 3.5 8.7 9 10 5.5-1.3 9-5.5 9-10V6.5L12 2z"/>
                    <path d="M9 12l2 2 4-4" stroke-width="2"/>
                </svg>
            </div>
            <h1 class="brand-name">ExamGuard</h1>
            <p class="brand-sub">AI Cheating Prevention &amp; Monitoring</p>
        </div>

        <div class="divider"></div>

        <p class="section-label">Administrator Access</p>

        <!-- Login Form -->
        <form method="POST" id="loginForm" autocomplete="off" novalidate>

            <div class="field">
                <label for="username">Username</label>
                <div class="field-input-wrap">
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter your username"
                        autocomplete="username"
                        required
                        autofocus>
                    <span class="field-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="field-input-wrap">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required>
                    <span class="field-icon">
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                Sign In to Dashboard
            </button>

        </form>

        {% if error %}
        <p class="login-error" id="loginError">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ error }}
        </p>
        {% endif %}

        <div class="login-footer">
            <strong>Authorized Personnel Only</strong><br>
            Centralized Exam Security System
        </div>

    </div>

</body>
</html>
